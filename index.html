<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amo vocês</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rose:    #e8647a;
      --blush:   #f4b8c1;
      --cream:   #fff7f0;
      --warm:    #7a3948;
      --shadow:  rgba(122, 57, 72, 0.25);
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 20%, #fde8ec 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, #fce4d6 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e8647a' fill-opacity='0.04'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 29 L43 44 L30 35 L17 44 L22 29 L10 20 L25 20Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)   rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem 3.5rem;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      border: 1.5px solid rgba(232, 100, 122, 0.2);
      box-shadow:
        0 8px 40px var(--shadow),
        0 1px 0 rgba(255,255,255,0.9) inset;
      max-width: 420px;
      width: 90vw;
      animation: cardIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      color: var(--warm);
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
      animation: titleIn 1s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes titleIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--rose);
      letter-spacing: 2px;
      margin-bottom: 2.2rem;
      opacity: 0.8;
      animation: titleIn 1s 0.35s ease both;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      margin: 0 auto 2rem;
      animation: titleIn 1s 0.4s ease both;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 1.8rem;
      overflow: hidden;
      cursor: pointer;
      box-shadow:
        0 4px 24px var(--shadow),
        0 0 0 4px rgba(232, 100, 122, 0.12);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      animation: titleIn 1s 0.5s ease both;
    }

    .photo-wrap:hover {
      box-shadow:
        0 8px 36px var(--shadow),
        0 0 0 6px rgba(232, 100, 122, 0.22);
      transform: scale(1.01);
    }

    .photo-wrap:active {
      transform: scale(0.97);
    }

    .photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 1.8rem;
      transition: opacity 0.55s ease;
    }

    .photo-wrap img.behind  { opacity: 1; }
    .photo-wrap img.front   { opacity: 0; }
    .photo-wrap img.visible { opacity: 1; }
    .photo-wrap img.hidden  { opacity: 0; }

    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(122, 57, 72, 0.75);
      color: #fff;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .photo-wrap:hover .hint { opacity: 1; }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 1.4rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blush);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .dot.active {
      background: var(--rose);
      transform: scale(1.35);
    }

    @keyframes burst {
      0%   { clip-path: circle(0%   at 50% 50%); }
      100% { clip-path: circle(150% at 50% 50%); }
    }

    .photo-wrap img.burst {
      animation: burst 0.55s ease forwards;
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="card">
    <h1>Amo vocês</h1>
    <p class="subtitle">com todo o meu coração ♡</p>
    <div class="divider"></div>

    <div class="photo-wrap" id="photoWrap">
      <img id="imgBehind" class="behind" src="fotos/f1.jpg" alt="foto 1" />
      <img id="imgFront"  class="front"  src="fotos/f2.jpg" alt="foto 2" />
      <span class="hint">toque para ver mais ✦</span>
    </div>

    <div class="dots" id="dots"></div>
  </div>

  <script>
    const photos   = ['fotos/f1.jpg', 'fotos/f2.jpg', 'fotos/f3.jpg'];
    let current    = 0;
    let animating  = false;

    const wrap      = document.getElementById('photoWrap');
    const imgBehind = document.getElementById('imgBehind');
    const imgFront  = document.getElementById('imgFront');
    const dotsEl    = document.getElementById('dots');

    photos.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    });

    function updateDots(idx) {
      dotsEl.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === idx)
      );
    }

    wrap.addEventListener('click', () => {
      if (animating) return;
      animating = true;

      const next    = (current + 1) % photos.length;
      const nextSrc = photos[next];

      imgFront.src = nextSrc;
      imgFront.alt = `foto ${next + 1}`;

      imgFront.classList.add('burst');
      imgFront.classList.add('visible');
      imgFront.classList.remove('hidden');

      setTimeout(() => {
        imgBehind.src = nextSrc;
        imgFront.classList.remove('burst', 'visible');
        imgFront.classList.add('hidden');

        current = next;
        updateDots(current);
        animating = false;
      }, 580);
    });

    const heartsEl = document.getElementById('hearts');
    const symbols  = ['♡', '❤', '♥', '💕', '💗'];

    function spawnHeart() {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left             = Math.random() * 100 + 'vw';
      h.style.fontSize         = (0.8 + Math.random() * 1.6) + 'rem';
      h.style.animationDuration = (6 + Math.random() * 8) + 's';
      h.style.animationDelay   = (Math.random() * 4) + 's';
      h.style.color = `hsl(${340 + Math.random() * 30}, 80%, ${60 + Math.random() * 20}%)`;
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 16000);
    }

    setInterval(spawnHeart, 900);
    for (let i = 0; i < 6; i++) spawnHeart();
  </script>
</body>
</html>
